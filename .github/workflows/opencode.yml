name: OpenCode GitHub Integration

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:   # 手动触发，方便测试

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  opencode-task:
    # 仅当评论中包含 /opencode 时触发，且仅限你指定的用户
    if: |
      (github.event_name == 'issue_comment' && 
       contains(github.event.comment.body, '/opencode')) &&
       github.event.comment.user.login == 'LampingSu'
    runs-on: ubuntu-latest
    timeout-minutes: 15    # 本地模型可能较慢
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OpenCode
        if: steps.cache-opencode.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set dynamic API Key (using = as separator)
        run: |
          MODEL="${{ vars.OPENCODE_MODEL }}"
          PROVIDER="${MODEL%%/*}"
          echo "Provider: $PROVIDER"
          MAPPING_TABLE="${{ vars.API_KEY_PREFIX }}"
          IFS=',' read -ra PAIRS <<< "$MAPPING_TABLE"
          for pair in "${PAIRS[@]}"; do
            pair="$(echo "$pair" | xargs)"
            key="${pair%%=*}"
            value="${pair#*=}"
            if [[ "$PROVIDER" == "$key" ]]; then
              ENV_VAR_NAME="${value}_API_KEY"
              echo "$ENV_VAR_NAME=${{ secrets.API_KEY }}" >> $GITHUB_ENV
              echo "✅ Set $ENV_VAR_NAME"
              exit 0
            fi
          done
          echo "❌ No mapping for provider: $PROVIDER"
          exit 1

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ env.OPENCODE_MODEL }}
          use_github_token: true
          prompt: |
            你是 OpenCode AI 编程助手。请查阅并分析当前 Issue 或 PR 的上下文，执行对应操作：
            - 如果是 Issue，针对各发言人已提出的疑问、问题、期望、要求，尤其是已提出的对你的期望和要求，给予回复。
            - 如果是 PR，审查代码变更，指出潜在错误和改进建议。
            请用中文回复。
